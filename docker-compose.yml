version: '3.8'

services:
  # --- Database ---
  postgres:
    image: postgres:16-alpine
    container_name: hexa-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - hexa-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Cache ---
  redis:
    image: redis:7-alpine
    container_name: hexa-redis
    networks:
      - hexa-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Storage ---
  minio:
    image: minio/minio
    container_name: hexa-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - hexa-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Backend ---
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: hexa-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      SENTRY_DSN: ${SENTRY_DSN}
      CORS_ORIGINS: http://localhost,http://${SERVER_IP}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hexa-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- CMS ---
  cms:
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    container_name: hexa-cms
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      APP_KEYS: ${APP_KEYS}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hexa-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1337/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Frontend ---
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: hexa-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000/api
    depends_on:
      backend:
        condition: service_healthy
      cms:
        condition: service_healthy
    networks:
      - hexa-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: hexa-proxy
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - hexa-internal

networks:
  hexa-internal:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
