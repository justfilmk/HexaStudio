name: hexastudio

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

services:
  # ---------------------------------------------------------------------------
  # Reverse Proxy
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.3
    <<: *default-restart
    logging: *default-logging
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_certs:/letsencrypt
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik-dashboard.rule=Host(`${TRAEFIK_DASHBOARD_HOST:-traefik.localhost}`)
      - traefik.http.routers.traefik-dashboard.service=api@internal
      - traefik.http.routers.traefik-dashboard.entrypoints=web

  # ---------------------------------------------------------------------------
  # Data Stores (internal network only — no public ports)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    <<: *default-restart
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hexastudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-hexastudio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hexastudio} -d ${POSTGRES_DB:-hexastudio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    <<: *default-restart
    logging: *default-logging
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Object Storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    <<: *default-restart
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hexastudio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    networks:
      - web
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.minio-api.rule=Host(`${MINIO_API_HOST:-storage.localhost}`)
      - traefik.http.routers.minio-api.entrypoints=web
      - traefik.http.routers.minio-api.service=minio-api
      - traefik.http.services.minio-api.loadbalancer.server.port=9000
      - traefik.http.routers.minio-console.rule=Host(`${MINIO_CONSOLE_HOST:-storage-console.localhost}`)
      - traefik.http.routers.minio-console.entrypoints=web
      - traefik.http.routers.minio-console.service=minio-console
      - traefik.http.services.minio-console.loadbalancer.server.port=9001

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hexastudio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    entrypoint: /bin/sh
    command: /scripts/init-buckets.sh
    volumes:
      - ./docker/minio/init-buckets.sh:/scripts/init-buckets.sh:ro
    networks:
      - internal
    restart: "no"

  # ---------------------------------------------------------------------------
  # Applications
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    <<: *default-restart
    logging: *default-logging
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-hexastudio}:${POSTGRES_PASSWORD}@postgres:5432/hexastudio_api
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      SENTRY_DSN: ${SENTRY_DSN:-}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-hexastudio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - web
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`${API_HOST:-api.localhost}`)
      - traefik.http.routers.backend.entrypoints=web
      - traefik.http.routers.backend.middlewares=secure-headers@file,compress@file
      - traefik.http.services.backend.loadbalancer.server.port=4000

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api.localhost}
        NEXT_PUBLIC_CMS_URL: ${NEXT_PUBLIC_CMS_URL:-http://cms.localhost}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    <<: *default-restart
    logging: *default-logging
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      - backend
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`${FRONTEND_HOST:-localhost}`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.routers.frontend.middlewares=secure-headers@file,compress@file
      - traefik.http.services.frontend.loadbalancer.server.port=3000

  cms:
    build:
      context: ./apps/cms
      dockerfile: Dockerfile
    <<: *default-restart
    logging: *default-logging
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: 0.0.0.0
      PORT: ${STRAPI_PORT:-1337}
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: hexastudio_cms
      DATABASE_USERNAME: ${POSTGRES_USER:-hexastudio}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_SSL: "false"
      APP_KEYS: ${STRAPI_APP_KEYS:?STRAPI_APP_KEYS is required}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT:?STRAPI_API_TOKEN_SALT is required}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET:?STRAPI_ADMIN_JWT_SECRET is required}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT:?STRAPI_TRANSFER_TOKEN_SALT is required}
      JWT_SECRET: ${STRAPI_JWT_SECRET:?STRAPI_JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - cms_uploads:/opt/app/public/uploads
    networks:
      - web
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.cms.rule=Host(`${CMS_HOST:-cms.localhost}`)
      - traefik.http.routers.cms.entrypoints=web
      - traefik.http.routers.cms.middlewares=secure-headers@file
      - traefik.http.services.cms.loadbalancer.server.port=1337

  # ---------------------------------------------------------------------------
  # Monitoring
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    <<: *default-restart
    logging: *default-logging
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - web
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.prometheus.rule=Host(`${PROMETHEUS_HOST:-prometheus.localhost}`)
      - traefik.http.routers.prometheus.entrypoints=web
      - traefik.http.services.prometheus.loadbalancer.server.port=9090

  grafana:
    image: grafana/grafana:11.3.0
    <<: *default-restart
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://${GRAFANA_HOST:-grafana.localhost}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - web
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`${GRAFANA_HOST:-grafana.localhost}`)
      - traefik.http.routers.grafana.entrypoints=web
      - traefik.http.services.grafana.loadbalancer.server.port=3000

  loki:
    image: grafana/loki:3.2.1
    <<: *default-restart
    logging: *default-logging
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - internal

  promtail:
    image: grafana/promtail:3.2.1
    <<: *default-restart
    logging: *default-logging
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./docker/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - internal

  node-exporter:
    image: prom/node-exporter:v1.8.2
    <<: *default-restart
    logging: *default-logging
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Auto-updates & Backups
  # ---------------------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:latest
    <<: *default-restart
    logging: *default-logging
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_SCHEDULE: "0 0 6 * * *"
      WATCHTOWER_LABEL_ENABLE: "true"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  backup:
    image: alpine:3.20
    <<: *default-restart
    logging: *default-logging
    entrypoint: /bin/sh
    command: /scripts/backup.sh
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-hexastudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hexastudio}
      MINIO_ENDPOINT: minio
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-hexastudio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      BACKUP_DIR: /backups
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./docker/backup/backup.sh:/scripts/backup.sh:ro
      - backup_data:/backups
    networks:
      - internal

networks:
  web:
    name: hexastudio_web
  internal:
    name: hexastudio_internal
    internal: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
  cms_uploads:
  traefik_certs:
  prometheus_data:
  grafana_data:
  loki_data:
  backup_data:
