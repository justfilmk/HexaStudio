# Dynamic Traefik configuration (TLS, middlewares)
http:
  middlewares:
    secure-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true

    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    compress:
      compress: {}

tls:
  options:
    default:
      minVersion: VersionTLS12
      sniStrict: true
