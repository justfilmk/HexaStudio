# Dynamic Traefik configuration (TLS, middlewares)
http:
  middlewares:
    secure-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true

    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    compress:
      compress: {}

  routers:
    opencode:
      rule: "Host(`opencode.hexastudio.net`)"
      entryPoints:
        - websecure
      service: opencode
      tls:
        certResolver: letsencrypt
      middlewares:
        - secure-headers
        - rate-limit

    ai:
      rule: "Host(`ai.hexastudio.net`)"
      entryPoints:
        - websecure
      service: lmstudio
      tls: {}
      middlewares:
        - secure-headers
        - rate-limit

  services:
    opencode:
      loadBalancer:
        servers:
          - url: "http://172.20.0.1:4096"

    lmstudio:
      loadBalancer:
        servers:
          - url: "http://172.17.0.1:1234"

tls:
  options:
    default:
      minVersion: VersionTLS12
      sniStrict: false
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/default.crt
        keyFile: /etc/traefik/certs/default.key
