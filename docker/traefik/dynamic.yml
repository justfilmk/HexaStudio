http:
  middlewares:
    secure-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; media-src 'self' https:; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'"

    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    compress:
      compress: {}

    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true

  routers:
    opencode:
      rule: "Host(`opencode.hexastudio.net`)"
      entryPoints:
        - web
        - websecure
      service: opencode
      tls:
        certResolver: cloudflare
      middlewares:
        - secure-headers
        - rate-limit

    ai:
      rule: "Host(`ai.hexastudio.net`)"
      entryPoints:
        - web
        - websecure
      service: lmstudio
      tls:
        certResolver: cloudflare
      middlewares:
        - secure-headers
        - rate-limit

    frontend:
      rule: "Host(`hexastudio.net`) || Host(`www.hexastudio.net`)"
      entryPoints:
        - web
        - websecure
      service: frontend
      tls:
        certResolver: cloudflare
      middlewares:
        - secure-headers
        - compress

    backend:
      rule: "Host(`api.hexastudio.net`)"
      entryPoints:
        - web
        - websecure
      service: backend
      tls:
        certResolver: cloudflare
      middlewares:
        - secure-headers
        - compress

    cms:
      rule: "Host(`cms.hexastudio.net`)"
      entryPoints:
        - web
        - websecure
      service: cms
      tls:
        certResolver: cloudflare
      middlewares:
        - secure-headers

  services:
    opencode:
      loadBalancer:
        servers:
          - url: "http://172.20.0.1:4096"

    lmstudio:
      loadBalancer:
        servers:
          - url: "http://172.17.0.1:1234"

    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"

    backend:
      loadBalancer:
        servers:
          - url: "http://backend:4000"

    cms:
      loadBalancer:
        servers:
          - url: "http://cms:1337"

tls:
  options:
    default:
      minVersion: VersionTLS12
      sniStrict: true