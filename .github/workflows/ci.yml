name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test --workspace=apps/backend

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build Frontend
        run: npm run build --workspace=apps/frontend

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/e2e/

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build --workspace=apps/frontend

      - name: Start Server
        run: nohup npm run start --workspace=apps/frontend > /tmp/server.log 2>&1 &

      - name: Wait for Server
        run: |
          for i in {1..30}; do
            curl -s http://localhost:3000 > /dev/null && break
            sleep 1
          done

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: http://localhost:3000
          uploadArtifacts: true
          temporaryPublicStorage: true

  accessibility:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build --workspace=apps/frontend

      - name: Install axe-core
        run: npm install --save-dev @axe-core/cli

      - name: Start Server
        run: nohup npm run start --workspace=apps/frontend > /tmp/server.log 2>&1 &

      - name: Wait for Server
        run: |
          for i in {1..30}; do
            curl -s http://localhost:3000 > /dev/null && break
            sleep 1
          done

      - name: Run Accessibility Audit
        run: npx axe http://localhost:3000 --exit
